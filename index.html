<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle">
      <span class="toggle-icon">&#9790;</span>
      <span class="toggle-label">LIGHT</span>
    </button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section" id="leaderboard-panel">
          <span class="label">RECORDS</span>
          <ol id="leaderboard-list" class="leaderboard-list"></ol>
          <div class="leaderboard-stats">
            <span>Mejor combo: <strong id="best-combo">0</strong></span>
            <span>Líneas máximas: <strong id="max-lines">0</strong></span>
          </div>
          <button id="reset-scores-btn">Resetear records</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>

        <div id="overlay-leaderboard" class="hidden">
          <span class="label">TOP 5</span>
          <ol id="overlay-leaderboard-list" class="leaderboard-list"></ol>
          <div class="leaderboard-stats">
            <span>Mejor combo: <strong id="overlay-best-combo">0</strong></span>
            <span>Líneas máximas: <strong id="overlay-max-lines">0</strong></span>
          </div>
          <button id="overlay-reset-scores-btn">Resetear records</button>
        </div>

        <div id="record-form" class="hidden">
          <p class="record-prompt">¡Nuevo récord! Ingresa tu nombre:</p>
          <input type="text" id="name-input" maxlength="12" placeholder="Jugador" autocomplete="off" />
          <button id="save-score-btn">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
